<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finding Matches...</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; color: #333; margin: 0; padding: 20px; text-align: center; }
        #loader-container { padding-top: 100px; }
        .spinner { 
            border: 5px solid #ddd; border-top: 5px solid #ff4b2b; 
            border-radius: 50%; width: 50px; height: 50px; 
            animation: spin 1s linear infinite; margin: 20px auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #match-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 20px; max-width: 1000px; margin: 40px auto; display: none;
        }
        .match-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .match-card img { width: 100%; height: 300px; object-fit: cover; filter: blur(8px); }
        .card-info { padding: 20px; }
        .chat-btn { 
            background: #ff4b2b; color: white; border: none; 
            padding: 12px; border-radius: 10px; width: 100%; 
            font-weight: 600; cursor: pointer; 
        }
        h2#status-text { font-weight: 300; color: #666; }
    </style>
</head>
<body>

    <div id="loader-container">
        <h2 id="status-text">Synchronizing local data...</h2>
        <div class="spinner"></div>
    </div>

    <div id="results-container" style="display:none;">
        <h1 id="welcome-header">Best Matches</h1>
        <div id="match-grid"></div>
    </div>

    <script src="matching.js"></script>

</body>
</html>
