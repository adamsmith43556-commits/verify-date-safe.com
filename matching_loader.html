<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Results | Secure Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff4b2b; --bg: #0a0a0a; --card: #161616; --green: #4ade80; }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
        }

        /* Luxury Header Area */
        .premium-header {
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #1a1a1a, var(--bg));
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(74, 222, 128, 0.1);
            color: var(--green);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 15px;
            border: 1px solid rgba(74, 222, 128, 0.2);
        }
        .dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; box-shadow: 0 0 10px var(--green); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        h1 { font-size: 28px; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .loc-text { color: #888; font-size: 14px; margin-top: 5px; }

        /* Match Grid */
        .grid { max-width: 420px; margin: 30px auto; padding: 0 20px 100px 20px; }
        
        .profile-card {
            background: var(--card);
            border-radius: 30px;
            margin-bottom: 35px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: fadeIn 0.8s ease forwards;
            opacity: 0;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .img-wrapper { position: relative; width: 100%; height: 420px; }
        .main-img { width: 100%; height: 100%; object-fit: cover; filter: blur(15px) brightness(0.8); transition: 0.5s; }
        
        .verified-tag {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border: 1px solid var(--green);
            color: var(--green);
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 800;
            display: flex; align-items: center; gap: 5px;
        }

        .details { padding: 25px; }
        .name-age { font-size: 24px; font-weight: 700; margin-bottom: 5px; }
        .distance { color: #666; font-size: 13px; margin-bottom: 20px; display: flex; align-items: center; gap: 5px; }
        
        .premium-btn {
            background: linear-gradient(135deg, #ff4b2b, #ff416c);
            color: white; border: none; width: 100%; padding: 20px;
            border-radius: 20px; font-weight: 800; font-size: 16px;
            cursor: pointer; box-shadow: 0 10px 25px rgba(255, 75, 43, 0.3);
            transition: 0.3s;
        }
        .premium-btn:active { transform: scale(0.96); }

        /* Floating Trust Footer */
        .trust-footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(15px);
            padding: 15px; text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 10px; color: #444; letter-spacing: 1px;
            z-index: 100;
        }
    </style>
</head>
<body>

<div class="premium-header">
    <div class="live-indicator">
        <div class="dot"></div> <span id="member-count">1,248</span> ELITE MEMBERS NEARBY
    </div>
    <h1 id="headline">Verified Matches</h1>
    <p class="loc-text">Exclusive access for members in <span id="city-name" style="color:white; font-weight:bold;">your city</span></p>
</div>

<div class="grid" id="matches-container">
    </div>

<div class="trust-footer">
    SECURE SSL ENCRYPTED CONNECTION | PRIVACY PROTECTED
</div>

<script>
    // 1. Setup Data
    const userCity = sessionStorage.getItem('userLocation') || "your area";
    document.getElementById('city-name').innerText = userCity;
    document.getElementById('headline').innerText = `Matches in ${userCity}`;
    
    // Fake "Members Nearby" randomizer for realism
    document.getElementById('member-count').innerText = Math.floor(Math.random() * (1500 - 800) + 800).toLocaleString();

    const girls = [
        { name: "Sarah", age: 24, img: "p1.jpg" }, { name: "Elena", age: 27, img: "p2.jpg" },
        { name: "Mia", age: 25, img: "p3.jpg" }, { name: "Jessica", age: 23, img: "p4.jpg" },
        { name: "Chloe", age: 26, img: "p5.jpg" }, { name: "Sophia", age: 22, img: "p6.jpg" },
        { name: "Amara", age: 25, img: "p7.jpg" }, { name: "Isabella", age: 28, img: "p8.jpg" },
        { name: "Olivia", age: 24, img: "p9.jpg" }, { name: "Zainab", age: 26, img: "p10.jpg" },
        { name: "Grace", age: 24, img: "p11.jpg" }, { name: "Ava", age: 27, img: "p12.jpg" },
        { name: "Lily", age: 25, img: "p13.jpg" }, { name: "Emily", age: 23, img: "p14.jpg" },
        { name: "Aria", age: 26, img: "p15.jpg" }, { name: "Maya", age: 24, img: "p16.jpg" },
        { name: "Nora", age: 25, img: "p17.jpg" }
    ];

    const container = document.getElementById('matches-container');

    // 2. Build the Grid
    girls.forEach((g, index) => {
        const delay = index * 0.1; // Staggered loading effect
        container.innerHTML += `
            <div class="profile-card" style="animation-delay: ${delay}s">
                <div class="img-wrapper">
                    <img src="${g.img}" class="main-img">
                    <div class="verified-tag">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        IDENTITY VERIFIED
                    </div>
                </div>
                <div class="details">
                    <div class="name-age">${g.name}, ${g.age}</div>
                    <div class="distance">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                        Less than 5 miles from ${userCity}
                    </div>
                    <button class="premium-btn" onclick="window.location.href='security.html'">Send Private Message</button>
                </div>
            </div>
        `;
    });
</script>

</body>
</html>
