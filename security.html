<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Clearance | Secure Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f0f0f; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .secure-container { background: #1a1a1a; padding: 40px; border-radius: 28px; width: 350px; text-align: center; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        .icon-header { font-size: 50px; color: #ff4b2b; margin-bottom: 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        h2 { margin: 0; font-size: 1.6rem; letter-spacing: -0.5px; }
        .sub-text { font-size: 13px; opacity: 0.6; line-height: 1.5; margin: 15px 0 25px 0; }
        
        .timer-box { background: rgba(255, 75, 43, 0.1); padding: 15px; border-radius: 15px; border: 1px dashed #ff4b2b; margin-bottom: 25px; }
        #timer { font-size: 24px; font-weight: bold; color: #ff4b2b; }
        .timer-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; opacity: 0.8; }

        .price-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding: 0 10px; }
        .price-label { font-size: 14px; opacity: 0.8; }
        .amount { font-size: 22px; font-weight: bold; }

        .btn-pay { background: #ff4b2b; color: white; border: none; padding: 20px; width: 100%; border-radius: 14px; font-weight: 600; font-size: 17px; cursor: pointer; transition: 0.3s; }
        .btn-pay:hover { background: #ff310d; transform: scale(1.02); }
        
        .security-badges { margin-top: 25px; display: flex; justify-content: center; gap: 15px; opacity: 0.4; filter: grayscale(1); }
    </style>
</head>
<body>

<div class="secure-container">
    <div class="icon-header">🛡️</div>
    <h2>Identity Clearance</h2>
    <p class="sub-text">A temporary security hold is required to verify your profile and protect our community members from automated bots.</p>

    <div class="timer-box">
        <div class="timer-label">Reserved Matches Expire In:</div>
        <div id="timer">05:00</div>
    </div>

    <div class="price-row">
        <span class="price-label">Refundable Deposit:</span>
        <span class="amount">$14.99</span>
    </div>

    <button class="btn-pay" onclick="triggerPayment()">Complete Verification</button>

    <div class="security-badges" style="font-size: 11px; color: #4ade80; opacity: 1; filter: none;">
        <span>🔒 SSL Secure</span> • <span>💳 PCI Compliant</span>
    </div>
</div>

<script>
    // Countdown Logic
    let timeLeft = 300; 
    const timerDisplay = document.getElementById('timer');

    setInterval(() => {
        if (timeLeft <= 0) return;
        timeLeft--;
        let minutes = Math.floor(timeLeft / 60);
        let seconds = timeLeft % 60;
        timerDisplay.innerHTML = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
    }, 1000);

    function triggerPayment() {
        const name = sessionStorage.getItem('userName');
        alert(`Redirecting ${name} to encrypted payment gateway...`);
        // Here is where you would link to a payment processor for your research
    }
</script>

</body>
</html>
