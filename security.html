<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Identity Clearance | PureMatch Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff4b2b; --bg: #050505; --card: #111111; --green: #4ade80; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: white; font-family: 'Inter', sans-serif; 
            margin: 0; padding: 20px 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* Status Progress Bar */
        .progress-container { width: 90%; max-width: 400px; display: flex; justify-content: space-between; margin-bottom: 40px; position: relative; }
        .step { font-size: 9px; font-weight: 800; color: #333; letter-spacing: 1.5px; text-transform: uppercase; }
        .step.done { color: var(--green); }
        .step.active { color: #fff; position: relative; }
        .step.active::after { content: ''; position: absolute; bottom: -8px; left: 0; width: 100%; height: 2px; background: var(--primary); }

        .security-card { 
            width: 92%; max-width: 400px; background: var(--card); border-radius: 40px; 
            padding: 40px 25px; border: 1px solid rgba(255,255,255,0.06); text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        /* The Urgency Timer */
        .timer-strip { 
            background: rgba(255, 75, 43, 0.08); border: 1px solid rgba(255, 75, 43, 0.2);
            padding: 12px; border-radius: 15px; margin-bottom: 30px;
            color: var(--primary); font-size: 12px; font-weight: 700; letter-spacing: 0.5px;
        }
        #countdown { font-family: monospace; font-size: 14px; }

        h1 { font-size: 26px; font-weight: 800; margin: 0 0 10px 0; letter-spacing: -1px; }
        .subtitle { font-size: 13px; color: #666; margin-bottom: 30px; line-height: 1.6; }

        /* The Price Table */
        .invoice-box { 
            background: #000; border-radius: 25px; padding: 25px; margin-bottom: 30px; 
            border: 1px solid #1a1a1a; text-align: left;
        }
        .invoice-line { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .invoice-line:last-child { margin-bottom: 0; padding-top: 15px; border-top: 1px solid #1a1a1a; }
        .label { font-size: 11px; color: #555; text-transform: uppercase; font-weight: 700; }
        .val { font-size: 14px; font-weight: 600; }
        .total-val { font-size: 22px; font-weight: 800; color: #fff; }

        .secure-btn { 
            background: #fff; color: #000; border: none; width: 100%; padding: 22px; 
            border-radius: 20px; font-weight: 800; font-size: 17px; cursor: pointer;
            box-shadow: 0 20px 40px rgba(255,255,255,0.05); transition: 0.3s;
        }
        .secure-btn:active { transform: scale(0.97); }

        .badge-row { display: flex; justify-content: center; gap: 20px; margin-top: 30px; opacity: 0.4; filter: grayscale(1); }
        
        /* Fake Notification pop-up */
        #notif {
            position: fixed; top: 20px; width: 90%; max-width: 350px; background: #fff; color: #000;
            padding: 15px; border-radius: 20px; display: none; align-items: center; gap: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); z-index: 10000; animation: slideDown 0.5s ease;
        }
        @keyframes slideDown { from { transform: translateY(-100px); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="notif">
        <div style="width: 10px; height: 10px; background: var(--green); border-radius: 50%;"></div>
        <span style="font-size: 11px; font-weight: 700;" id="notif-text"></span>
    </div>

    <div class="progress-container">
        <span class="step done">MATCHING ✓</span>
        <span class="step done">PROFILE ✓</span>
        <span class="step active">CLEARANCE</span>
    </div>

    <div class="security-card">
        <div class="timer-strip">
            RESERVING ACCESS FOR: <span id="countdown">04:40</span>
        </div>

        <h1 id="userName">Account Pending</h1>
        <p class="subtitle">Our automated security layer requires a temporary deposit to verify your identity and unlock match private data.</p>

        <div class="invoice-box">
            <div class="invoice-line">
                <span class="label">Security Level</span>
                <span class="val" style="color: var(--green);">ELITE VIP</span>
            </div>
            <div class="invoice-line">
                <span class="label">Deposit Type</span>
                <span class="val">REFUNDABLE</span>
            </div>
            <div class="invoice-line">
                <span class="label">Total to Pay</span>
                <span class="total-val">$14.99</span>
            </div>
        </div>

        <button class="secure-btn" onclick="location.href='crypto_pay.html'">Complete Verification</button>

        <div class="badge-row">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" width="50">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" width="40">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" width="30">
        </div>
    </div>

    <p style="font-size: 10px; color: #333; margin-top: 30px; letter-spacing: 1px; font-weight: 700;">
        SECURE 256-BIT ENCRYPTED CONNECTION
    </p>

    <script>
        // Set user name from previous page
        const storedName = sessionStorage.getItem('userName') || "Guest User";
        document.getElementById('userName').innerText = `Welcome, ${storedName}`;

        // 4:40 Countdown
        let time = 280;
        const display = document.getElementById('countdown');
        setInterval(() => {
            let m = Math.floor(time / 60);
            let s = time % 60;
            display.innerText = `0${m}:${s < 10 ? '0' : ''}${s}`;
            if (time > 0) time--;
        }, 1000);

        // Fake Social Proof pop-ups
        const names = ["James", "Robert", "Michael", "William", "David", "Richard"];
        const cities = ["London", "New York", "Chicago", "Manchester", "Houston"];
        
        function showNotif() {
            const n = document.getElementById('notif');
            const txt = document.getElementById('notif-text');
            const randomName = names[Math.floor(Math.random() * names.length)];
            const randomCity = cities[Math.floor(Math.random() * cities.length)];
            
            txt.innerText = `${randomName} from ${randomCity} just gained Elite Clearance.`;
            n.style.display = 'flex';
            setTimeout(() => { n.style.display = 'none'; }, 4000);
        }

        setTimeout(showNotif, 3000);
        setInterval(showNotif, 12000);
    </script>
</body>
</html>
