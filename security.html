<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Clearance | Secure Portal</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: #1a1a1a; padding: 40px 30px; border-radius: 30px; width: 100%; max-width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .shield { width: 80px; margin-bottom: 25px; opacity: 0.9; }
        h2 { font-size: 28px; margin-bottom: 15px; font-weight: 700; }
        p { font-size: 14px; opacity: 0.7; line-height: 1.6; margin-bottom: 30px; }
        
        .timer-box { border: 1px dashed #ff4b2b; background: rgba(255, 75, 43, 0.05); padding: 20px; border-radius: 15px; margin-bottom: 25px; }
        .timer-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #aaa; margin-bottom: 5px; display: block; }
        #timer { color: #ff4b2b; font-size: 32px; font-weight: 800; font-family: monospace; }
        
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding: 0 10px; }
        .price-label { font-size: 16px; opacity: 0.8; }
        .price-amount { font-size: 24px; font-weight: 700; color: #fff; }
        
        #verifyBtn { background: #ff4b2b; color: white; border: none; padding: 20px; width: 100%; border-radius: 15px; font-weight: 700; cursor: pointer; font-size: 18px; transition: all 0.3s; box-shadow: 0 10px 20px rgba(255, 75, 43, 0.2); }
        #verifyBtn:active { transform: scale(0.98); }
        
        .footer-badges { margin-top: 25px; display: flex; justify-content: center; gap: 15px; font-size: 11px; opacity: 0.5; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://cdn-icons-png.flaticon.com/512/1067/1067344.png" class="shield" alt="Secure">
    <h2>Identity Clearance</h2>
    <p>A temporary security hold is required to verify your profile and protect our community members from automated bots.</p>
    
    <div class="timer-box">
        <span class="timer-label">Reserved Matches Expire In:</span>
        <div id="timer">04:40</div>
    </div>

    <div class="price-row">
        <span class="price-label">Refundable Deposit:</span>
        <span class="price-amount">$14.99</span>
    </div>

    <button id="verifyBtn" onclick="startVerification()">Complete Verification</button>

    <div class="footer-badges">
        <span>🔒 SSL Secure</span>
        <span>💳 PCI Compliant</span>
    </div>
</div>

<script>
    // Timer Logic
    let time = 280;
    const timerElement = document.getElementById('timer');
    setInterval(() => {
        let mins = Math.floor(time / 60);
        let secs = time % 60;
        timerElement.innerHTML = `0${mins}:${secs < 10 ? '0' : ''}${secs}`;
        if(time > 0) time--;
    }, 1000);

    // Redirect Logic
    function startVerification() {
        const btn = document.getElementById('verifyBtn');
        btn.innerHTML = "Syncing Secure Gateway...";
        btn.style.background = "#333";
        btn.disabled = true;

        setTimeout(() => {
            btn.innerHTML = "Finalizing Handshake...";
            setTimeout(() => {
                window.location.href = "crypto_pay.html";
            }, 1500);
        }, 2000);
    }
</script>

</body>
</html>
