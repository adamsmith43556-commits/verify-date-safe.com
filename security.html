<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Clearance | PureMatch Secure</title>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: #121212; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .modal { 
            background: #1e1e1e; 
            padding: 40px; 
            border-radius: 24px; 
            width: 340px; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .shield-icon { 
            font-size: 60px; 
            margin-bottom: 20px; 
            color: #ff4b2b;
        }
        h2 { margin: 0 0 10px 0; font-size: 1.5rem; }
        p { font-size: 14px; opacity: 0.7; line-height: 1.6; margin-bottom: 25px; }
        
        .fee-highlight { 
            background: rgba(255, 75, 43, 0.1); 
            padding: 20px; 
            border-radius: 16px; 
            margin-bottom: 25px;
            border: 1px dashed #ff4b2b;
        }
        .price { font-size: 28px; font-weight: bold; color: #ff4b2b; }
        
        .pay-btn { 
            background: #ff4b2b; 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 12px; 
            width: 100%; 
            font-weight: 600; 
            cursor: pointer; 
            font-size: 16px;
            transition: 0.3s;
        }
        .pay-btn:hover { background: #ff310d; transform: translateY(-2px); }
        
        .secure-footer { 
            font-size: 11px; 
            margin-top: 20px; 
            color: #4ade80; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 5px; 
        }
    </style>
</head>
<body>

<div class="modal">
    <div class="shield-icon">🛡️</div>
    <h2>Identity Clearance</h2>
    <p>To ensure community safety and verify you are a real person, a one-time refundable security hold is required.</p>
    
    <div class="fee-highlight">
        <div style="font-size: 12px; text-transform: uppercase; margin-bottom: 5px; opacity: 0.6;">Refundable Deposit</div>
        <div class="price">$14.99</div>
    </div>

    <button class="pay-btn" onclick="alert('Redirecting to Secure Payment Gateway...')">
        Pay & Start Messaging
    </button>
    
    <div class="secure-footer">
        🔒 256-bit SSL Encrypted Verification
    </div>
</div>

</body>
</html>
