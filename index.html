<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PureMatch | Private Membership</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff4b2b; --accent: #ff1f5b; --bg: #050505; --card: #111111; --green: #4ade80; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden; 
            /* THE FIX: Changed 'flex' to allow scrolling if the phone screen is short */
            display: block; 
        }

        body {
            padding: 60px 0; /* Adds space at the top so the logo isn't hidden by the notch */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .glow-top {
            position: fixed; top: -150px; right: -50px; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(255, 75, 43, 0.12) 0%, rgba(0,0,0,0) 70%);
            z-index: -1; pointer-events: none;
        }

        .portal-card { 
            width: 92%; 
            max-width: 410px; 
            padding: 40px 25px; 
            background: var(--card); 
            border-radius: 40px; 
            border: 1px solid rgba(255,255,255,0.06); 
            box-shadow: 0 50px 100px rgba(0,0,0,0.9); 
            text-align: center;
            position: relative;
            backdrop-filter: blur(10px);
            margin: auto; /* Keeps it centered */
        }

        .brand-name { 
            color: var(--primary); 
            font-size: 36px; 
            font-weight: 800; 
            margin: 0; 
            letter-spacing: -2px; 
            line-height: 1;
        }
        
        .clearance-badge {
            display: inline-flex; align-items: center; gap: 8px; font-size: 10px; font-weight: 800; color: var(--green);
            background: rgba(74, 222, 128, 0.08); padding: 7px 16px; border-radius: 50px; text-transform: uppercase;
            letter-spacing: 2px; margin: 15px 0 30px 0; border: 1px solid rgba(74, 222, 128, 0.15);
        }
        .pulse-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; box-shadow: 0 0 10px var(--green); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        h1 { font-size: 22px; font-weight: 700; margin: 0 0 10px 0; color: #fff; }
        .description { font-size: 13px; color: #777; margin-bottom: 30px; line-height: 1.5; padding: 0 10px; }

        .form-group { margin-bottom: 20px; text-align: left; width: 100%; }
        
        label { 
            font-size: 10px; color: #555; text-transform: uppercase; margin-bottom: 8px; 
            display: block; font-weight: 700; letter-spacing: 1px; padding-left: 4px; 
        }

        input, select { 
            width: 100%; 
            padding: 16px 18px; 
            background: #181818; 
            border: 1px solid #282828; 
            border-radius: 16px; 
            color: white; 
            font-size: 16px; 
            outline: none;
            transition: 0.3s;
            appearance: none;
        }
        input:focus { border-color: var(--primary); background: #1c1c1c; }

        .action-btn { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%); 
            color: white; border: none; padding: 20px; width: 100%; 
            border-radius: 18px; font-weight: 800; font-size: 17px; 
            cursor: pointer; margin-top: 10px; 
            box-shadow: 0 15px 35px rgba(255, 75, 43, 0.3);
            letter-spacing: 0.5px;
        }
        .action-btn:active { transform: scale(0.97); }

        .secure-footer { 
            margin-top: 30px; font-size: 10px; color: #333; 
            display: flex; align-items: center; justify-content: center; gap: 10px; 
            letter-spacing: 1px; font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="glow-top"></div>

    <div class="portal-card">
        <h2 class="brand-name">PureMatch</h2>
        <div class="clearance-badge">
            <div class="pulse-dot"></div>
            Identity Clearance Active
        </div>
        
        <h1>Elite Verification</h1>
        <p class="description">Access the private local network by completing your membership profile below.</p>

        <div class="form-group">
            <label>Legal Full Name</label>
            <input type="text" id="userName" placeholder="Your name" required>
        </div>

        <div class="form-group">
            <label>Current Residential City</label>
            <input type="text" id="locationInput" placeholder="e.g. London, UK" required>
        </div>

        <div class="form-group">
            <label>Membership Tier Interest</label>
            <select id="accessLevel">
                <option value="Elite">Elite (Standard Access)</option>
                <option value="VIP">VIP (Instant Messenger)</option>
                <option value="Platinum">Platinum (Incognito Access)</option>
            </select>
        </div>

        <button class="action-btn" onclick="submitApplication()">Continue to Matches</button>

        <div class="secure-footer">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            SECURE END-TO-END ENCRYPTION
        </div>
    </div>

    <script>
        function submitApplication() {
            const nameInput = document.getElementById('userName').value.trim();
            const locationInput = document.getElementById('locationInput').value.trim();
            const btn = document.querySelector('.action-btn');

            if (!nameInput || !locationInput) {
                alert("Identity verification requires all fields to be completed.");
                return;
            }

            btn.innerHTML = "Verifying Identity...";
            btn.style.opacity = "0.7";
            btn.disabled = true;

            sessionStorage.setItem('userName', nameInput);
            sessionStorage.setItem('userLocation', locationInput);

            setTimeout(() => {
                window.location.href = 'matching_loader.html';
            }, 1200);
        }
    </script>

</body>
</html>
