<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PureMatch | Elite Membership Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff4b2b; --gold: #d4af37; --bg: #050505; --card: #111111; }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            overflow: hidden;
        }

        /* Luxury Background Effect */
        .bg-glow {
            position: absolute; width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(255, 75, 43, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: -100px; right: -100px; z-index: -1;
        }

        .container { 
            width: 90%; 
            max-width: 420px; 
            padding: 45px 35px; 
            background: var(--card); 
            border-radius: 40px; 
            border: 1px solid rgba(255,255,255,0.05); 
            box-shadow: 0 40px 100px rgba(0,0,0,0.8); 
            text-align: center;
            position: relative;
        }

        .logo { 
            color: var(--primary); 
            font-size: 38px; 
            font-weight: 800; 
            margin-bottom: 5px; 
            letter-spacing: -2px; 
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            font-weight: 800;
            color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
            padding: 6px 14px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 25px;
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        h1 { font-size: 24px; font-weight: 700; margin-bottom: 10px; color: #fff; }
        .intro-text { font-size: 14px; color: #666; margin-bottom: 35px; line-height: 1.6; }

        /* Form Styling */
        .form-section { text-align: left; }
        .input-group { margin-bottom: 22px; }
        
        label { 
            font-size: 11px; 
            color: #555; 
            text-transform: uppercase; 
            margin-bottom: 10px; 
            display: block; 
            font-weight: 700; 
            letter-spacing: 1px;
            padding-left: 5px;
        }

        input, select { 
            width: 100%; 
            padding: 18px; 
            background: #181818; 
            border: 1px solid #252525; 
            border-radius: 18px; 
            color: white; 
            font-size: 16px; 
            box-sizing: border-box; 
            outline: none; 
            transition: all 0.3s ease;
        }

        input:focus { border-color: var(--primary); background: #1c1c1c; box-shadow: 0 0 15px rgba(255, 75, 43, 0.1); }

        .btn { 
            background: linear-gradient(135deg, #ff4b2b 0%, #ff1f5b 100%); 
            color: white; 
            border: none; 
            padding: 22px; 
            width: 100%; 
            border-radius: 18px; 
            font-weight: 800; 
            font-size: 17px; 
            cursor: pointer; 
            margin-top: 20px; 
            box-shadow: 0 15px 35px rgba(255, 75, 43, 0.3);
            transition: 0.3s ease;
            letter-spacing: 0.5px;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 20px 40px rgba(255, 75, 43, 0.4); }
        .btn:active { transform: scale(0.97); }

        .footer-note {
            margin-top: 30px;
            font-size: 11px;
            color: #444;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="container">
    <div class="logo">PureMatch</div>
    <div class="status-badge">
        <span style="width: 6px; height: 6px; background: #4ade80; border-radius: 50%; display: inline-block;"></span>
        Identity Gateway Active
    </div>
    
    <h1>Exclusive Access</h1>
    <p class="intro-text">Complete your verification to view verified elite members in your immediate vicinity.</p>

    <div class="form-section">
        <div class="input-group">
            <label>Legal Full Name</label>
            <input type="text" id="userName" placeholder="Enter your name" required>
        </div>

        <div class="input-group">
            <label>Current Residential City</label>
            <input type="text" id="locationInput" placeholder="e.g. London, UK" required>
        </div>

        <div class="input-group">
            <label>Access Level Requested</label>
            <select id="accessLevel">
                <option value="Elite">Standard Elite Access</option>
                <option value="VIP">VIP Private Access</option>
                <option value="Platinum">Platinum Discreet Access</option>
            </select>
        </div>

        <button class="btn" onclick="processApplication()">Request Private Access</button>
    </div>

    <div class="footer-note">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        ENCRYPTED 256-BIT SECURITY PROTOCOL
    </div>
</div>

<script>
    function processApplication() {
        const name = document.getElementById('userName').value;
        const loc = document.getElementById('locationInput').value;
        
        if (!name || !loc) {
            alert("Please complete all verification fields.");
            return;
        }

        // Save data for personalization in the Results & Security pages
        sessionStorage.setItem('userName', name);
        sessionStorage.setItem('userLocation', loc);
        
        // Premium transition feel (redirect to loader)
        window.location.href = 'matching_loader.html';
    }
</script>

</body>
</html>

    </div>

    <div class="input-group">
        <label>Identify Preference</label>
        <select id="gender">
            <option>Seeking Women</option>
            <option>Seeking Men</option>
            <option>Seeking Both</option>
        </select>
    </div>

    <button class="btn" onclick="saveAndProceed()">Explore Elite Matches</button>
    
    <div class="secure-tag">
        <img src="https://cdn-icons-png.flaticon.com/512/2553/2553313.png" width="12" style="filter: grayscale(1);">
        256-BIT END-TO-END ENCRYPTION
    </div>
</div>

<script>
    function saveAndProceed() {
        const loc = document.getElementById('locationInput').value;
        
        // Save the location so the 17 matches can use it later
        if (loc) {
            sessionStorage.setItem('userLocation', loc);
        } else {
            sessionStorage.setItem('userLocation', 'your local area');
        }
        
        // Redirect to the loading screen
        window.location.href = 'matching_loader.html';
    }
</script>

</body>
</html>
