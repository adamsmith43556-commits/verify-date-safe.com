<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PureMatch | Verified Elite Connections</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body, html { height: 100%; margin: 0; font-family: 'Inter', sans-serif; background: #1a1a1a; }
        .hero-bg {
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1516589174184-c68526614467?auto=format&fit=crop&w=1920&q=80');
            height: 100%; background-position: center; background-size: cover;
            display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);
            width: 320px; text-align: center; color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { font-weight: 600; margin-bottom: 8px; font-size: 2rem; }
        p { font-weight: 300; font-size: 0.9rem; margin-bottom: 24px; opacity: 0.8; }
        input {
            width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 12px;
            border: none; background: rgba(255,255,255,0.9); font-size: 1rem; box-sizing: border-box;
        }
        .btn-start {
            width: 100%; padding: 16px; border: none; border-radius: 12px;
            background: #ff4b2b; color: white; font-weight: 600;
            cursor: pointer; transition: 0.3s; font-size: 1rem;
        }
        .btn-start:hover { background: #ff310d; transform: scale(1.02); }
        .secure-tag { font-size: 0.75rem; margin-top: 15px; color: #4ade80; display: flex; align-items: center; justify-content: center; gap: 5px; }
    </style>
</head>
<body>

<div class="hero-bg">
    <div class="login-box">
        <h1>PureMatch</h1>
        <p>Premium local verified network.</p>
        
        <input type="text" id="victim_name" placeholder="Full Name" required>
        <input type="text" id="victim_city" placeholder="City (e.g. Houston, TX)" required>

        <button class="btn-start" onclick="saveAndNext()">See Matches Near Me</button>

        <div class="secure-tag">
            <span>🛡️</span> Secure SSL Encrypted Connection
        </div>
    </div>
</div>

<script>
    function saveAndNext() {
        const nameInput = document.getElementById('victim_name').value;
        const cityInput = document.getElementById('victim_city').value;
        
        if(nameInput.trim() !== "" && cityInput.trim() !== "") {
            // Save data for the next page to use
            sessionStorage.setItem('userName', nameInput);
            sessionStorage.setItem('userCity', cityInput);
            
            // REDIRECT: Ensure this file exists in your GitHub!
            window.location.href = "matching_loader.html"; 
        } else {
            alert("Please fill in your details to continue.");
        }
    }
</script>

</body>
</html>
