<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PureMatch | Elite Membership Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #0a0a0a; 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            text-align: center; 
        }
        .container { 
            width: 90%; 
            max-width: 400px; 
            padding: 30px; 
            background: #121212;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .logo { 
            color: #ff4b2b; 
            font-size: 36px; 
            font-weight: 800; 
            margin-bottom: 5px; 
            letter-spacing: -1px;
        }
        .subtitle {
            font-size: 12px;
            color: #4ade80;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            font-weight: 700;
        }
        h1 { font-size: 22px; margin-bottom: 25px; font-weight: 700; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        label { 
            font-size: 11px; 
            color: #666; 
            text-transform: uppercase; 
            margin-bottom: 8px; 
            display: block; 
            padding-left: 5px;
        }
        input, select { 
            width: 100%; 
            padding: 16px; 
            background: #1a1a1a; 
            border: 1px solid #2a2a2a; 
            border-radius: 14px; 
            color: white; 
            font-size: 16px; 
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: #ff4b2b; background: #222; }
        
        .btn { 
            background: #ff4b2b; 
            color: white; 
            border: none; 
            padding: 18px; 
            width: 100%; 
            border-radius: 14px; 
            font-weight: 700; 
            font-size: 17px; 
            cursor: pointer; 
            margin-top: 15px; 
            box-shadow: 0 10px 20px rgba(255, 75, 43, 0.2);
            transition: 0.3s;
        }
        .btn:active { transform: scale(0.98); }

        .secure-tag {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 25px;
            font-size: 11px;
            color: #444;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">PureMatch</div>
    <div class="subtitle">Secure Network</div>
    <h1>Verify Your Access</h1>

    <div class="input-group">
        <label>Enter Your Current City</label>
        <input type="text" id="locationInput" placeholder="e.g. Lagos, Nigeria" required>
    </div>

    <div class="input-group">
        <label>Identify Preference</label>
        <select id="gender">
            <option>Seeking Women</option>
            <option>Seeking Men</option>
            <option>Seeking Both</option>
        </select>
    </div>

    <button class="btn" onclick="saveAndProceed()">Explore Elite Matches</button>
    
    <div class="secure-tag">
        <img src="https://cdn-icons-png.flaticon.com/512/2553/2553313.png" width="12" style="filter: grayscale(1);">
        256-BIT END-TO-END ENCRYPTION
    </div>
</div>

<script>
    function saveAndProceed() {
        const loc = document.getElementById('locationInput').value;
        
        // Save the location so the 17 matches can use it later
        if (loc) {
            sessionStorage.setItem('userLocation', loc);
        } else {
            sessionStorage.setItem('userLocation', 'your local area');
        }
        
        // Redirect to the loading screen
        window.location.href = 'matching_loader.html';
    }
</script>

</body>
</html>
