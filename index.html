<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PureMatch | Verified Elite Connections</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body, html { height: 100%; margin: 0; font-family: 'Inter', sans-serif; }
        
        /* The Background: High-quality, emotive image */
        .hero-bg {
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1516589174184-c68526614467?auto=format&fit=crop&w=1920&q=80');
            height: 100%; background-position: center; background-repeat: no-repeat; background-size: cover;
            display: flex; align-items: center; justify-content: center;
        }

        /* The Premium "Glass" Container */
        .login-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);
            width: 350px; text-align: center; color: white;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h1 { font-weight: 600; margin-bottom: 10px; }
        p { font-weight: 300; font-size: 0.9em; margin-bottom: 30px; opacity: 0.9; }

        input {
            width: 90%; padding: 12px; margin-bottom: 15px; border-radius: 8px;
            border: none; background: rgba(255,255,255,0.9); font-size: 1em;
        }

        .btn-start {
            width: 100%; padding: 15px; border: none; border-radius: 8px;
            background: #ff4b2b; color: white; font-weight: 600;
            cursor: pointer; transition: 0.3s; font-size: 1.1em;
        }

        .btn-start:hover { background: #ff416c; transform: translateY(-2px); }

        .secure-tag { font-size: 0.7em; margin-top: 20px; color: #00ff88; }
    </style>
</head>
<body>

<div class="hero-bg">
    <div class="login-box">
        <h1>PureMatch</h1>
        <p>Your local verified network is ready.</p>
        
        <input type="text" id="victim_name" placeholder="Enter Your Name" required>
        
        <input type="text" id="victim_city" placeholder="Your City (e.g. Lagos, Houston)" required>

        <button class="btn-start" onclick="saveAndNext()">See Matches Near Me</button>

        <div class="secure-tag">
            <img src="https://cdn-icons-png.flaticon.com/512/2550/2550341.png" width="12" style="vertical-align:middle"> 
            Secure SSL Encrypted Connection
        </div>
    </div>
</div>

<script>
    function saveAndNext() {
        const name = document.getElementById('victim_name').value;
        const city = document.getElementById('victim_city').value;
        
        if(name && city) {
            // "Identity Anchoring": Store for the next scripts to use
            sessionStorage.setItem('userName', name);
            sessionStorage.setItem('userCity', city);
            window.location.href = "matching_loader.html"; // The next step
        } else {
            alert("Please fill in your details to continue.");
        }
    }
</script>

</body>
</html>
